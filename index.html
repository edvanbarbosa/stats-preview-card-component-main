<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Stats preview card component</title>
</head>
<body>
  <main>
      <section class="card_container">
        <section class="text_container">
          <div class="h1_container">
            <h1>Get <span>insights</span> that help,<br> your business grow.</h1>
          </div>
          <div class="p_container">
            <p>
              Discover the benefits of data analytics and make<br> better decisions regarding revenue, customer <br>
              experience, and overall efficiency.
            </p>
          </div>
          <div class="numbers_container">
            <p><span>10k+</span><br> companies</p>
            <p><span>314 </span> <br>templates</p>
            <p><span>12m+</span><br> queries</p>
          </div>
        </section>
        <section class="img_container">
          <div class="filtro_roxo"></div>
          <img src="images/image-header-desktop.jpg" alt="image-header-desktop">
        </section>
      </section>
  </main>
</body>
</html>
